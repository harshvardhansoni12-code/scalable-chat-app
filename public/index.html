<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="user-info">
                <h3>Welcome!</h3>
                <div id="current-user"></div>
            </div>
            
            <div class="room-info">
                <h4>Room: <span id="current-room">general</span></h4>
                <div class="online-users">
                    <h5>Online Users (<span id="user-count">0</span>)</h5>
                    <ul id="users-list"></ul>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="join-form" id="join-form">
                <h2>Join Chat</h2>
                <input type="text" id="username-input" placeholder="Enter your username" maxlength="20">
                <input type="text" id="room-input" placeholder="Room name (optional)" value="general" maxlength="50">
                <button id="join-btn">Join Chat</button>
            </div>

            <div class="chat-interface" id="chat-interface" style="display: none;">
                <div class="messages-container" id="messages-container">
                    <div id="messages"></div>
                </div>
                
                <div class="message-input-container">
                    <input type="text" id="message-input" placeholder="Type your message..." maxlength="1000">
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
